<!doctype html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#090b10"><link rel="manifest" href="manifest.webmanifest">
<title>Charge Karo</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#090b10;color:#fff;font-family:system-ui,Arial}.app{max-width:540px;margin:auto;padding:18px 16px 100px}.top,.row{display:flex;justify-content:space-between;align-items:center}.brand{font-size:25px;font-weight:900}.brand b,.live{color:#d9ff43}.pill{background:#151920;border:1px solid #292f39;padding:9px 12px;border-radius:99px;font-size:12px}.hero{margin-top:20px;padding:22px;border:1px solid #303824;border-radius:28px;background:linear-gradient(135deg,#1c2415,#11151b)}h1{font-size:35px;line-height:1;margin:0 0 10px}p,.muted{color:#9da6b6}.types{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 0}.type{padding:13px 4px;border-radius:16px;border:1px solid #292f39;background:#141820;color:#fff}.type span{display:block;font-size:25px}.type.active{border-color:#d9ff43;background:#202719}.btn{width:100%;padding:15px;border-radius:17px;font-weight:900;margin-top:9px}.primary{border:0;background:#d9ff43;color:#111}.secondary{border:1px solid #303642;background:#151920;color:#fff}.section{margin-top:25px}.item{display:flex;align-items:center;gap:12px;padding:14px;background:#141820;border:1px solid #292f39;border-radius:19px;margin-top:10px}.ico{width:48px;height:48px;border-radius:15px;background:#242b20;display:grid;place-items:center;font-size:23px}.grow{flex:1}.grow b{display:block}.grow small{color:#9da6b6}.badge{font-size:10px;color:#d9ff43}.toast{display:none;position:fixed;z-index:9;top:18px;left:50%;transform:translateX(-50%);background:#fff;color:#111;padding:11px 15px;border-radius:99px;font-weight:800;white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis}
</style></head><body><div id="toast" class="toast"></div><main class="app">
<div class="top"><div class="brand">Charge <b>Karo⚡</b></div><div class="pill" id="state">Connecting…</div></div>
<section class="hero"><h1>Power nearby.<br>When you need it.</h1><p>Live mobile, EV bike and EV car power network.</p>
<div class="types"><button class="type active" data-v="phone"><span>📱</span>Mobile</button><button class="type" data-v="bike"><span>🏍️</span>EV Bike</button><button class="type" data-v="car"><span>🚗</span>EV Car</button></div>
<button id="request" class="btn primary">🆘 REQUEST POWER</button>
<button id="share" class="btn secondary">🔋 SHARE / LIST POWER</button>
<button id="map" class="btn secondary">🗺️ FIND CHARGING ON MAP</button><button id="installApp" class="btn secondary" style="display:none">⬇️ DOWNLOAD / INSTALL APP</button></section>
<section class="section"><div class="row"><h2>Live network</h2><span class="live">● REALTIME</span></div><div id="feed"><p class="muted">Connecting…</p></div></section>
<footer style="text-align:center;padding:28px 10px;color:#9da6b6;font-size:13px">Created by <b style="color:#d9ff43">Chunchu Dilipkumar</b> ⚡</footer></main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
const firebaseConfig={
 apiKey:"AIzaSyDfBcR9aesAei5xQZk0bR9cqMe3ejAMCsQ",
 authDomain:"charge-karo-aef85.firebaseapp.com",
 databaseURL:"https://charge-karo-aef85-default-rtdb.firebaseio.com",
 projectId:"charge-karo-aef85",
 storageBucket:"charge-karo-aef85.firebasestorage.app",
 messagingSenderId:"993549745259",
 appId:"1:993549745259:web:b3a33214f8c44c9a9ac52e",
 measurementId:"G-15BSQ491NV"
};
const app=initializeApp(firebaseConfig),db=getDatabase(app),auth=getAuth(app);
let vehicle="phone",pos=null,user=null;
const $=s=>document.querySelector(s);
const toast=t=>{let x=$("#toast");x.textContent=t;x.style.display="block";setTimeout(()=>x.style.display="none",2500)};
document.querySelectorAll(".type").forEach(b=>b.onclick=()=>{document.querySelectorAll(".type").forEach(x=>x.classList.remove("active"));b.classList.add("active");vehicle=b.dataset.v});
navigator.geolocation.getCurrentPosition(p=>{pos={lat:p.coords.latitude,lng:p.coords.longitude};toast("📍 Live location ready")},()=>toast("Allow location for nearby matching"),{enableHighAccuracy:true});
try{let c=await signInAnonymously(auth);user=c.user;$("#state").textContent="🟢 Online"}catch(e){$("#state").textContent="🔴 Auth needed";toast("Enable Anonymous sign-in in Firebase")}
async function publish(kind){
 if(!user)return toast("Enable Anonymous Authentication first");
 if(!pos)return toast("Allow location first");
 try{
  const item=push(ref(db,"powerNetwork"));
  await set(item,{uid:user.uid,kind,vehicle,lat:pos.lat,lng:pos.lng,status:"active",createdAt:Date.now()});
  toast(kind==="request"?"🆘 Live request sent":"🔋 Power listing is live");
 }catch(e){toast("Database permission/setup error")}
}
$("#request").onclick=()=>publish("request");$("#share").onclick=()=>publish("provider");
$("#map").onclick=()=>{let q={phone:"mobile phone charging station near me",bike:"EV bike charging station near me",car:"EV charging station near me"}[vehicle];window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q),"_blank")};
const feed=$("#feed"),icons={phone:"📱",bike:"🏍️",car:"🚗"};
onValue(query(ref(db,"powerNetwork"),limitToLast(30)),snap=>{
 feed.innerHTML="";
 if(!snap.exists()){feed.innerHTML='<p class="muted">No live requests yet. Be the first.</p>';return}
 let rows=[];snap.forEach(c=>rows.push(c.val()));rows.reverse().forEach(x=>{
  let div=document.createElement("div");div.className="item";
  div.innerHTML=`<div class="ico">${icons[x.vehicle]||"⚡"}</div><div class="grow"><b>${x.kind==="provider"?"Power available":"Power requested"}</b><small>${x.vehicle==="phone"?"Mobile":x.vehicle==="bike"?"EV Bike":"EV Car"} • live now</small></div><span class="badge">${(x.status||"ACTIVE").toUpperCase()}</span>`;
  feed.appendChild(div);
 });
},()=>feed.innerHTML='<p class="muted">Database access error.</p>');

let deferredPrompt=null;
const installBtn=$("#installApp");
window.addEventListener("beforeinstallprompt",e=>{
 e.preventDefault(); deferredPrompt=e; installBtn.style.display="block";
});
installBtn.onclick=async()=>{
 if(deferredPrompt){
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null; installBtn.style.display="none";
 }else{
  toast("Chrome menu ⋮ → Add to Home screen / Install app");
 }
};
window.addEventListener("appinstalled",()=>toast("⚡ Charge Karo installed"));
if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js");
</script></body></html>
